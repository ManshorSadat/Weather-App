<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <!-- Sets how the website scales and fits to different device screens -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Link to the external CSS file for styling -->
  <link rel="stylesheet" href="style.css" />
  <!-- External script for adding icons from Font Awesome -->
  <script src="https://kit.fontawesome.com/64d58efce2.js" crossorigin="anonymous"></script>
  <title>Weather Forecast App</title> <!-- Title of the web page shown on the tab -->
</head>
<body>
  <div class="wrapper">
    <!-- Sidebar contains elements like search bar, weather icon, and location info -->
    <div class="sidebar">
      <div>
        <!-- Form for searching weather by city or location -->
        <form action="" class="search" id="search">
          <input type="text" id="query" placeholder="Search..." />
          <button>
            <i class="fas fa-search"></i> <!-- Search icon -->
          </button>
        </form>
        <!-- Displays the weather icon -->
        <div class="weather-icon">
          <img src="icons/sun/4.png" alt="" id="icon" />
        </div>
        <!-- Shows the temperature -->
        <div class="temprature">
          <h1 id="temp">0</h1>
          <span class="temp-unit">°C</span>
        </div>
        <!-- Date and time section -->
        <div class="date-time">
          <p id="date-time">Monday, 12:00</p>
        </div>
        <!-- Visual separator -->
        <div class="divider"></div>
        <!-- Current weather condition and precipitation percentage -->
        <div class="condition-rain">
          <div class="condition">
            <i class="fas fa-cloud"></i>
            <div class="condition" id="condition">condition</div>
          </div>
          <div class="rain">
            <i class="fas fa-tint"></i>
            <p id="rain">perc - 0%</p>
          </div>
        </div>
      </div>
      <!-- Location display using a marker icon -->
      <div class="location">
        <div class="location-icon">
          <i class="fas fa-map-marker-alt"></i>
        </div>
        <div class="location-text">
          <p id="location">location</p>
        </div>
      </div>
    </div>
    <!-- Main content area for showing forecasts and details -->
    <div class="main">
      <!-- Navigation bar for selecting forecast period and temperature units -->
      <nav>
        <ul class="options">
          <button class="hourly">today</button>
          <button class="week active">week</button>
          <button class="month">15 Days</button>
        </ul>
        <ul class="options units">
          <button class="celcius active">°C</button>
          <button class="fahrenheit">°F</button>
        </ul>
      </nav>

      <!-- Suggestion based on current weather conditions -->
      <div class="weather-feedback">
        <h2 class="heading">Suggestion</h2>
        <p id="weather-feedback"></p>
      </div>

      <!-- Area where the weather cards will be dynamically inserted -->
      <div class="cards" id="weather-cards"></div>
      <!-- Highlights today's weather aspects like wind and humidity -->
      <div class="highlights">
        <h2 class="heading">Today's Highlights</h2>
        <div class="cards">
          <div class="card2">
            <h4 class="card-heading">Wind Status</h4>
            <div class="content">
              <p class="wind-speed">0</p>
              <p class="">Low</p>
            </div>
          </div>
          <div class="card2">
            <h4 class="card-heading">Air Quality</h4>
            <div class="content">
              <p class="air-quality">0</p>
              <p class="air-quality-status">Low</p>
            </div>
          </div>
          <div class="card2">
            <h4 class="card-heading">Humidity</h4>
            <div class="content">
              <p class="humidity">0</p>
              <p class="humidity-status">Low</p>
            </div>
          </div>
          <div class="card2">
            <h4 class="card-heading">Visibility</h4>
            <div class="content">
              <p class="visibility">0</p>
              <p class="visibility-status">Low</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Link to the JavaScript file that handles the functionality -->
  <script src="script.js"></script>
</body>
</html>
